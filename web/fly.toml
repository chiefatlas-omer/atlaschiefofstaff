app = 'atlas-command-center'
primary_region = 'ord'

[build]

[env]
  DATABASE_PATH = '/data/chiefofstaff.db'
  WEB_PORT = '3001'
  TZ = 'America/Chicago'
  NODE_ENV = 'production'

[[mounts]]
  source = 'chiefofstaff_data'
  destination = '/data'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/api/health"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
