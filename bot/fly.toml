app = 'atlaschief-bot'
primary_region = 'ord'

[build]

[env]
  DATABASE_PATH = '/data/chiefofstaff.db'
  PORT = '3000'
  TZ = 'America/Chicago'

[[mounts]]
  source = 'chiefofstaff_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
